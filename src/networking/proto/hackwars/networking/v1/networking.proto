syntax = "proto3";

package hackwars.networking.v1;

option java_multiple_files = true;
option java_package = "com.hackwars.networking.v1";
option java_outer_classname = "NetworkingProto";
option go_package = "hackwars/networking/v1;networkingv1";

message NetworkEnvelope {
  string message_id = 1;
  int64 sent_unix_ms = 2;

  oneof payload {
    PingRequest ping_request = 10;
    PingResponse ping_response = 11;
    ErrorMessage error = 12;
  }
}

message PingRequest {
  string client_id = 1;
}

message PingResponse {
  string server_id = 1;
  int64 server_unix_ms = 2;
}

message ErrorMessage {
  string code = 1;
  string message = 2;
}
