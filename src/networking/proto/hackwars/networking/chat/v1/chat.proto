syntax = "proto3";

package hackwars.networking.chat.v1;

option java_multiple_files = true;
option java_package = "com.hackwars.networking.chat.v1";
option java_outer_classname = "ChatProto";
option go_package = "hackwars/networking/chat/v1;chatv1";

message ChatPingRequest {}
message ChatPingResponse {
  string server_id = 1;
  int64 server_unix_ms = 2;
}
