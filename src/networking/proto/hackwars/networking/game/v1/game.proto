syntax = "proto3";

package hackwars.networking.game.v1;

option java_multiple_files = true;
option java_package = "com.hackwars.networking.game.v1";
option java_outer_classname = "GameProto";
option go_package = "hackwars/networking/game/v1;gamev1";

message GamePingRequest {}
message GamePingResponse {
  string server_id = 1;
  int64 server_unix_ms = 2;
}
