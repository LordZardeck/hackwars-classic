import java.util.Locale

plugins {
    id 'java'
    id 'war'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = JavaVersion.toVersion(25)
    targetCompatibility = JavaVersion.toVersion(25)
}

sourceSets {
    main {
        java.setSrcDirs([])
        resources.setSrcDirs([])
    }
}

def webappRootDir = layout.projectDirectory.dir('src/main/webapp').asFile
def resourcesRootDir = layout.projectDirectory.dir('src/main/resources').asFile
def chatServerResourcesDir = new File(resourcesRootDir, 'chatServer')
def legacyLibDir = layout.projectDirectory.dir('libs/legacy').asFile
def mainSourceDir = layout.projectDirectory.dir('src/main/java').asFile
def chatSourceDir = layout.projectDirectory.dir('src/chatServer/java').asFile
def tomcatVersion = '6.0.53'
def localTomcatVersion = providers.gradleProperty('localTomcatVersion').orElse('9.0.104').get()
def localTomcatMajorVersion = localTomcatVersion.split('\\.')[0]
def localTomcatBaseName = "apache-tomcat-${localTomcatVersion}"
def localTomcatRootDir = layout.projectDirectory.dir('build/tomcat').asFile
def localTomcatHomeDir = localTomcatRootDir
def localTomcatWebappsDir = new File(localTomcatHomeDir, 'webapps')
def localTomcatArchiveFile = layout.buildDirectory.file("downloads/${localTomcatBaseName}.tar.gz")
def localTomcatArchiveUrl = "https://archive.apache.org/dist/tomcat/tomcat-${localTomcatMajorVersion}/v${localTomcatVersion}/bin/${localTomcatBaseName}.tar.gz"

configurations {
    managedLegacyJars {
        transitive = false
    }
    managedRuntimeJars
}

dependencies {
    managedLegacyJars "org.apache.tomcat:servlet-api:${tomcatVersion}"
    managedLegacyJars "org.apache.tomcat:jsp-api:${tomcatVersion}"
    managedLegacyJars "org.apache.tomcat:el-api:${tomcatVersion}"
    managedRuntimeJars "mysql:mysql-connector-java:5.1.49"
    managedRuntimeJars "javax.servlet:jstl:1.2"
    managedRuntimeJars "taglibs:standard:1.1.2"
    managedRuntimeJars "commons-logging:commons-logging:1.2"
    managedRuntimeJars "net.java.dev.jogl:jogl:1.1.1-rc6"
    managedRuntimeJars "net.java.dev.gluegen:gluegen-rt:1.0b05"
}

def legacyRuntimeJarTree = fileTree(
        dir: legacyLibDir,
        include: ['**/*.jar']
)
def legacyRuntimeJars = files(legacyRuntimeJarTree)
def managedRuntimeJars = files(configurations.managedRuntimeJars)
def legacyCompileJars = files(legacyRuntimeJars, managedRuntimeJars, configurations.managedLegacyJars)

def hackServerSourceIncludes = [
        'Assignments/**/*.java',
        'Client/**/*.java',
        'Browser/**/*.java',
        'DBAdmin/**/*.java',
        'GUI/**/*.java',
        'Game/**/*.java',
        'HackerLogin/**/*.java',
        'HackerSearch/**/*.java',
        'Hackscript/**/*.java',
        'Hacktendo/**/*.java',
        'Legacy/**/*.java',
        'Server/**/*.java',
        'View/**/*.java',
        'chat/client/**/*.java',
        'chat/messages/**/*.java',
        'chat/util/**/*.java',
        'com/plink/Hack3D/**/*.java',
        'com/plink/dolphinnet/**/*.java',
        'com/plink/dolphinstem/**/*.java',
        'util/**/*.java'
]

def chatServerSourceIncludes = [
        'Assignments/**/*.java',
        'Server/**/*.java',
        'chat/messages/**/*.java',
        'chat/server/**/*.java',
        'chat/util/**/*.java',
        'com/plink/dolphinnet/**/*.java',
        'util/**/*.java'
]

def java25Compiler = javaToolchains.compilerFor {
    languageVersion = JavaLanguageVersion.of(25)
}

def java25Launcher = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(25)
}

def hackServerBuildOutputDir = layout.buildDirectory.dir('legacy-classes/main')
def chatServerBuildOutputDir = layout.buildDirectory.dir('legacy-classes/chat')

tasks.register('compileHackServer', JavaCompile) {
    group = 'build'
    description = 'Compiles the main HackWars services and client sources into build output using Java 25.'
    source = fileTree(mainSourceDir) {
        include hackServerSourceIncludes
    }
    classpath = legacyCompileJars
    destinationDirectory = hackServerBuildOutputDir
    options.encoding = 'UTF-8'
    javaCompiler = java25Compiler
}

tasks.register('compileChatServer', JavaCompile) {
    group = 'build'
    description = 'Compiles the dedicated chat server sources into build output using Java 25.'
    source = fileTree(chatSourceDir) {
        include chatServerSourceIncludes
    }
    classpath = legacyCompileJars
    destinationDirectory = chatServerBuildOutputDir
    options.encoding = 'UTF-8'
    javaCompiler = java25Compiler
}

tasks.register('compileServices') {
    group = 'build'
    description = 'Compiles both main and chat server source sets used by local services.'
    dependsOn 'compileHackServer', 'compileChatServer'
}

tasks.named('build') {
    dependsOn 'compileServices'
}

tasks.register('runHackerServer', JavaExec) {
    group = 'application'
    description = 'Runs Server.HackerServer with server id 1.'
    dependsOn 'compileHackServer'
    javaLauncher = java25Launcher
    classpath = files(hackServerBuildOutputDir, resourcesRootDir, legacyRuntimeJars, managedRuntimeJars)
    mainClass = 'Server.HackerServer'
    args '1'
    workingDir = resourcesRootDir
}

tasks.register('runChatServer', JavaExec) {
    group = 'application'
    description = 'Runs chatServer/Server.ChatServer.'
    dependsOn 'compileChatServer'
    javaLauncher = java25Launcher
    classpath = files(chatServerBuildOutputDir, resourcesRootDir, legacyRuntimeJars, managedRuntimeJars)
    mainClass = 'Server.ChatServer'
    workingDir = chatServerResourcesDir
}

def isWindows = System.getProperty('os.name')
        .toLowerCase(Locale.ROOT)
        .contains('win')
def isMac = System.getProperty('os.name')
        .toLowerCase(Locale.ROOT)
        .contains('mac')
def clientPackageInputDir = layout.buildDirectory.dir('jpackage/input')
def clientPackageOutputDir = layout.buildDirectory.dir('jpackage/dist')

def resolveJpackageExecutable = {
    def javaHome = new File(System.getProperty('java.home'))
    def executable = new File(javaHome, isWindows ? 'bin/jpackage.exe' : 'bin/jpackage')
    if (!executable.exists()) {
        throw new GradleException("jpackage was not found under ${javaHome}. Run Gradle with a JDK that includes jpackage (JDK 17+ recommended).")
    }
    return executable
}

tasks.named('war', War) {
    group = 'distribution'
    description = 'Builds a deployable WAR for an external Tomcat server.'
    dependsOn 'compileServices'
    archiveFileName = 'hackwars.war'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from(hackServerBuildOutputDir) {
        into 'WEB-INF/classes'
        include '**/*.class'
    }
    from(chatServerBuildOutputDir) {
        into 'WEB-INF/classes/chatServer'
        include '**/*.class'
    }
    from(resourcesRootDir) {
        into 'WEB-INF/classes'
    }
    from({ legacyRuntimeJarTree.files }) {
        into 'WEB-INF/lib'
    }
    from(configurations.managedRuntimeJars) {
        into 'WEB-INF/lib'
    }
    from(webappRootDir) {
        exclude 'WEB-INF/classes/**'
        exclude 'WEB-INF/lib/**'
        exclude 'WEB-INF/*.iml'
    }
}

tasks.register('deployWar', Copy) {
    group = 'distribution'
    description = 'Builds and copies hackwars.war into the managed build/tomcat webapps directory.'
    dependsOn 'war', 'setupTomcat'
    doNotTrackState('Tomcat webapps directories may include non-regular filesystem entries.')
    into(localTomcatWebappsDir)
    from(tasks.named('war'))
}

tasks.register('downloadTomcat') {
    group = 'distribution'
    description = "Downloads Apache Tomcat ${localTomcatVersion} archive into build/downloads."
    outputs.file(localTomcatArchiveFile)
    doLast {
        def archive = localTomcatArchiveFile.get().asFile
        if (archive.exists()) {
            logger.lifecycle("Tomcat archive already exists at ${archive}")
            return
        }
        archive.parentFile.mkdirs()
        logger.lifecycle("Downloading ${localTomcatArchiveUrl}")
        new URL(localTomcatArchiveUrl).withInputStream { input ->
            archive.withOutputStream { output -> output << input }
        }
    }
}

tasks.register('setupTomcat', Copy) {
    group = 'distribution'
    description = 'Installs a managed Tomcat distribution under build/tomcat.'
    dependsOn 'downloadTomcat'
    from({ tarTree(resources.gzip(localTomcatArchiveFile.get().asFile)) })
    into(localTomcatRootDir)
    eachFile {
        if (!it.path.contains('/')) {
            it.exclude()
            return
        }
        it.path = it.path.substring(it.path.indexOf('/') + 1)
    }
    includeEmptyDirs = false
    onlyIf {
        !new File(localTomcatHomeDir, isWindows ? 'bin/catalina.bat' : 'bin/catalina.sh').exists()
    }
}

tasks.register('deployLocalTomcatWar') {
    group = 'distribution'
    description = 'Alias for deployWar.'
    dependsOn 'deployWar'
}

tasks.register('runTomcat', Exec) {
    group = 'application'
    description = 'Runs the local Tomcat server in the foreground.'
    dependsOn 'deployWar'
    workingDir = localTomcatHomeDir
    environment 'CATALINA_HOME', localTomcatHomeDir.absolutePath
    environment 'CATALINA_BASE', localTomcatHomeDir.absolutePath
    commandLine(
            isWindows ? 'cmd' : new File(localTomcatHomeDir, 'bin/catalina.sh').absolutePath,
            *(isWindows
                    ? ['/c', new File(localTomcatHomeDir, 'bin/catalina.bat').absolutePath, 'run']
                    : ['run'])
    )
    doFirst {
        if (!isWindows) {
            new File(localTomcatHomeDir, 'bin/catalina.sh').setExecutable(true)
        }
    }
}

tasks.register('stopTomcat', Exec) {
    group = 'application'
    description = 'Stops the local Tomcat server.'
    dependsOn 'setupTomcat'
    workingDir = localTomcatHomeDir
    environment 'CATALINA_HOME', localTomcatHomeDir.absolutePath
    environment 'CATALINA_BASE', localTomcatHomeDir.absolutePath
    def catalinaScript = isWindows
            ? new File(localTomcatHomeDir, 'bin/catalina.bat').absolutePath
            : new File(localTomcatHomeDir, 'bin/catalina.sh').absolutePath
    commandLine(
            isWindows ? 'cmd' : catalinaScript,
            *(isWindows ? ['/c', catalinaScript, 'stop'] : ['stop'])
    )
    ignoreExitValue = true
    doFirst {
        if (!isWindows) {
            new File(localTomcatHomeDir, 'bin/catalina.sh').setExecutable(true)
        }
    }
    doLast {
        if (executionResult.get().exitValue != 0) {
            logger.lifecycle('Tomcat was not running or could not be stopped cleanly.')
        }
    }
}

tasks.register('runClientDesktop', JavaExec) {
    group = 'application'
    description = 'Starts the desktop client using Client.Launcher as a regular Swing application.'
    dependsOn 'compileHackServer'
    javaLauncher = java25Launcher
    classpath = files(hackServerBuildOutputDir, resourcesRootDir, legacyRuntimeJars, managedRuntimeJars)
    mainClass = 'Client.Launcher'
    workingDir = resourcesRootDir
}

tasks.register('runClient') {
    group = 'application'
    description = 'Alias for runClientDesktop.'
    dependsOn 'runClientDesktop'
}

tasks.register('clientLauncherJar', Jar) {
    group = 'build'
    description = 'Builds a runnable desktop client jar containing compiled classes and bundled resources.'
    dependsOn 'compileHackServer'
    archiveFileName = 'hackwars-client.jar'
    destinationDirectory = clientPackageInputDir
    from(hackServerBuildOutputDir)
    from(resourcesRootDir) {
        exclude 'chatServer/**'
    }
    manifest {
        attributes('Main-Class': 'Client.Launcher')
    }
}

tasks.register('prepareClientNativeInput', Sync) {
    group = 'distribution'
    description = 'Stages the client launcher jar and dependency jars for native packaging.'
    dependsOn 'clientLauncherJar'
    into clientPackageInputDir
    from(tasks.named('clientLauncherJar'))
    from({ legacyRuntimeJarTree.files })
    from(configurations.managedRuntimeJars)
}

tasks.register('packageClientNative', Exec) {
    group = 'distribution'
    description = 'Builds a native client app image for the current OS (Windows/macOS/Linux) via jpackage.'
    dependsOn 'prepareClientNativeInput'
    doFirst {
        def jpackageExecutable = resolveJpackageExecutable()
        def inputDir = clientPackageInputDir.get().asFile
        def outputDir = clientPackageOutputDir.get().asFile
        outputDir.mkdirs()
        def args = [
                jpackageExecutable.absolutePath,
                '--type', 'app-image',
                '--input', inputDir.absolutePath,
                '--dest', outputDir.absolutePath,
                '--name', 'HackWars',
                '--main-jar', 'hackwars-client.jar',
                '--main-class', 'Client.Launcher'
        ]
        if (isMac) {
            args += ['--mac-package-name', 'HackWars']
        }
        commandLine(args)
    }
}
